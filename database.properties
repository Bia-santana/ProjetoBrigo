package com.kds.confeitaria.service;

import com.kds.confeitaria.dao.ProdutoDAO;
import com.kds.confeitaria.model.AreaProducao;
import com.kds.confeitaria.model.Produto;

import java.util.List;

/**
 * Serviço responsável pelas operações relacionadas ao cardápio.
 * Fornece os produtos disponíveis para seleção na Tela Cliente.
 */
public class CardapioService {

    private final ProdutoDAO produtoDAO;

    public CardapioService() {
        this.produtoDAO = new ProdutoDAO();
    }

    /**
     * Retorna todos os produtos ativos do cardápio.
     */
    public List<Produto> getProdutosAtivos() {
        return produtoDAO.listarAtivos();
    }

    /**
     * Retorna os produtos de uma área de produção específica.
     */
    public List<Produto> getProdutosPorArea(AreaProducao area) {
        return produtoDAO.listarPorArea(area);
    }
}
